{% extends 'base.html' %}

{% block title %}
{{ book["title"] }}
{% endblock %}


{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg p-4">

        <div class="row">

            <!-- Book Image -->
            <div class="col-md-4">

                <img src="/static/images/{{ book['img'] }}"
                     class="img-fluid rounded">

            </div>


            <!-- Book Information -->
            <div class="col-md-8">

                <h1 class="fw-bold">
                    {{ book["title"] }}
                </h1>

                <h4 class="text-secondary">
                    {{ book["author"] }}
                </h4>

                <p class="mt-4">
                    {{ book["description"] }}
                </p>

                <h5>
                    Rating: ⭐ {{ book["rating"] }}
                </h5>

            </div>

        </div>

    </div>

</div>

{% endblock %}
