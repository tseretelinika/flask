<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #fff;
    }

    .page-center {
      height: calc(100vh - 56px); /* minus navbar height */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .register-card {
      width: 450px;
      padding: 30px;
      border: 1px solid #ddd;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
  </style>
</head>

<body>


  <nav class="navbar navbar-dark" style="background-color: #0d47a1;">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">register page</a>
    </div>
  </nav>


  <div class="page-center">

    <div class="register-card">

      <div class="alert alert-primary alert-dismissible fade show" role="alert">
        <strong>already have an account?</strong> login instead of registering!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <h2 class="text-center mb-3">Create Account</h2>

      <form>
        <input class="form-control mb-3" placeholder="Username">
        <input class="form-control mb-3" placeholder="Email">
        <input class="form-control mb-3" placeholder="Password">
        <input class="form-control mb-3" placeholder="Confirm Password">

        <button class="btn btn-dark w-100">Register</button>
      </form>

    </div>

  </div>

</body>
</html>
