<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TinDog{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            text-align: center;
            background: #fff;
        }

        .navbar-custom {
            background-color: #0d47a1;
        }

        .footer-custom {
            background: linear-gradient(45deg, #ff4c68, #ff6a88);
            color: white;
            padding: 40px;
            margin-top: 50px;
        }
    </style>

    {% block style %}
    {% endblock %}
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="/">TinDog</a>

        <div>
            <a href="/">Home</a>
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        </div>
    </div>
</nav>

{% block content %}
{% endblock %}

<footer class="footer-custom">
    <p>© TinDog</p>
    <p>Home | Features | Pricing | About</p>
</footer>

</body>
</html>
